<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaileyShop V3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; max-width: 600px; margin: auto; }
        .video { background: #222; padding: 15px; margin: 10px 0; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #E91E63; color: white; font-weight: bold; cursor: pointer; }
        h1 { text-align: center; color: #E91E63; }
        a { color: #00BFFF; text-decoration: none; }
    </style>
</head>
<body>
    <h1>BaileyShop V3.0 🔥</h1>
    
    <h2>Ajouter une vidéo</h2>
    <input id="titre" placeholder="Titre de la vidéo">
    <input id="lien" placeholder="Lien Facebook/YouTube">
    <input id="whatsapp" placeholder="Numéro WhatsApp sans +">
    <button onclick="ajouterVideo()">Publier la vidéo</button>
    
    <h2>Vidéos publiées</h2>
    <div id="liste-videos">Chargement...</div>

<script>
    const SUPABASE_URL = 'https://bqxdglwtjgypyuiwhfxt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxeGRnbHd0amd5cHl1aXdoZnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzA4MzYsImV4cCI6MjA5MjM0NjgzNn0.Gsfiu0hfniLucLmgEE1KP3M7-gdTpvrAB1UA_jHgJmc';
    
    let supabase;
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
        document.getElementById('liste-videos').innerHTML = 'Erreur connexion: ' + e.message;
    }

    async function ajouterVideo() {
        const titre = document.getElementById('titre').value;
        const lien = document.getElementById('lien').value;
        const whatsapp = document.getElementById('whatsapp').value;
        
        if (!titre || !lien) return alert('Titre et lien obligatoires !');
        
        const { error } = await supabase.from('videos').insert([{ titre, lien, whatsapp }]);
        
        if (error) {
            alert('Erreur: ' + error.message);
            console.error(error);
        } else {
            alert('Vidéo publiée boss !');
            document.getElementById('titre').value = '';
            document.getElementById('lien').value = '';
            document.getElementById('whatsapp').value = '';
            chargerVideos();
        }
    }

    async function chargerVideos() {
        try {
            const { data, error } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('liste-videos').innerHTML = 'Erreur: ' + error.message;
                console.error(error);
                return;
            }
            if (data.length === 0) {
                document.getElementById('liste-videos').innerHTML = 'Aucune vidéo. Sois le premier !';
                return;
            }
            
            document.getElementById('liste-videos').innerHTML = data.map(v => `
                <div class="video">
                    <h3>${v.titre}</h3>
                    <a href="${v.lien}" target="_blank">▶️ Voir la vidéo</a><br><br>
                    <a href="https://wa.me/${v.whatsapp}" target="_blank">💬 WhatsApp: ${v.whatsapp}</a>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('liste-videos').innerHTML = 'Erreur JS: ' + e.message;
            console.error(e);
        }
    }

    chargerVideos();
</script>
</body>
</html>
